name: Attach Cowork plugin zip to release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cowork-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node scripts/build-cowork-zip.mjs
      - name: Upload zip as release asset
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" dist/cupel-cowork.zip --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload zip as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: cupel-cowork-zip
          path: dist/cupel-cowork.zip
